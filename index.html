<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Unit Converter</title>
    <link rel="stylesheet" href="index.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>

<button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch to dark mode">
    <svg class="theme-icon theme-icon--moon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M21 12.79A9 9 0 0 1 11.21 3 7.5 7.5 0 1 0 21 12.79Z" />
    </svg>
    <svg class="theme-icon theme-icon--sun" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="4" />
        <path d="M12 1.5v3M12 19.5v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1.5 12h3M19.5 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12" />
    </svg>
</button>


<div class="container">

    <div class="header">

        <h1>Metric/Imperial Unit Conversion</h1>

        <input 
            id="input-number" 
            type="number" 
            value="20"
        >

        <br>

        <button id="convert-btn">
            Convert
        </button>

    </div>


    <div class="results">


        <div class="card">

            <h2>Length (Meter/Feet)</h2>

            <p id="length-result">
                20 meters = 65.616 feet |
                20 feet = 6.096 meters
            </p>

        </div>


        <div class="card">

            <h2>Volume (Liters/Gallons)</h2>

            <p id="volume-result">
                20 liters = 5.283 gallons |
                20 gallons = 75.708 liters
            </p>

        </div>



        <div class="card">

            <h2>Mass (Kilograms/Pounds)</h2>

            <p id="mass-result">
                20 kilos = 44.092 pounds |
                20 pounds = 9.072 kilos
            </p>

        </div>


    </div>


</div>


<script type="module" src="index.js"></script>

</body>
</html>
